name: Build Typst PDF Release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile Typst source
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            ghcr.io/typst/typst:latest \
            compile main.typ main.pdf

      - name: Publish PDF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest PDF
          body: |
            Automated Typst build for commit `${{ github.sha }}`.
          target_commitish: ${{ github.sha }}
          make_latest: true
          prerelease: false
          files: main.pdf
